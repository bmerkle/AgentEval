name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Weekly scan on Mondays

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Run Security DevSkim Analyzer
      uses: microsoft/security-devskim-action@v1.0.14
      with:
        directory-to-scan: .
        output-filename: devskim-results.sarif
        output-format: sarif

    - name: Upload DevSkim scan results to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: devskim-results.sarif

    - name: Check for vulnerable NuGet packages
      run: |
        echo "Checking for vulnerable packages..."
        dotnet list package --vulnerable --include-transitive > vulnerability-report.txt 2>&1 || true
        
        if grep -q "The given project has no vulnerable packages" vulnerability-report.txt; then
          echo "✅ No vulnerable packages found"
        elif grep -q "has the following vulnerable packages" vulnerability-report.txt; then
          echo "❌ Vulnerable packages detected:"
          cat vulnerability-report.txt
          echo "::error::Vulnerable dependencies found. Please update affected packages."
          exit 1
        else
          echo "ℹ️ Unable to determine vulnerability status"
          cat vulnerability-report.txt
        fi

    - name: Check for hardcoded secrets
      run: |
        echo "Scanning for potential secrets..."
        
        # Check for common secret patterns
        if grep -r -E "(api_key|apikey|secret|password|token|auth)" --include="*.cs" --include="*.json" --include="*.yml" --include="*.yaml" src/ samples/ tests/ || true; then
          echo "⚠️ Potential secrets found. Manual review required."
        else
          echo "✅ No obvious hardcoded secrets detected"
        fi
        
        # Check for Azure OpenAI keys (should only be in secure environment variables)
        if grep -r "sk-" --include="*.cs" --include="*.json" src/ samples/ tests/ || true; then
          echo "❌ Potential API key pattern found in source code"
          echo "::error::API key patterns detected in source code"
          exit 1
        else
          echo "✅ No API key patterns found in source code"
        fi

    - name: Upload vulnerability report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: |
          vulnerability-report.txt
          devskim-results.sarif
        retention-days: 30