name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Weekly scan on Mondays

# Skip if commit message contains [skip ci] or [ci skip]
# This is useful for documentation-only changes or formatting fixes

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Run Security DevSkim Analyzer
      # Using v1 tag which tracks latest v1.x release (currently v1.0.16)
      # See: https://github.com/microsoft/DevSkim-Action/releases
      uses: microsoft/DevSkim-Action@v1
      with:
        directory-to-scan: .
        output-filename: devskim-results.sarif

    - name: Upload DevSkim scan results to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: devskim-results.sarif
      continue-on-error: true  # Don't fail if GHAS is not available

    - name: Check for vulnerable NuGet packages
      run: |
        echo "Checking for vulnerable packages..."
        dotnet list package --vulnerable --include-transitive > vulnerability-report.txt 2>&1 || true
        
        if grep -q "The given project has no vulnerable packages" vulnerability-report.txt; then
          echo "✅ No vulnerable packages found"
        elif grep -q "has the following vulnerable packages" vulnerability-report.txt; then
          echo "❌ Vulnerable packages detected:"
          cat vulnerability-report.txt
          echo "::error::Vulnerable dependencies found. Please update affected packages."
          exit 1
        else
          echo "ℹ️ Unable to determine vulnerability status"
          cat vulnerability-report.txt
        fi

    - name: Check for hardcoded secrets
      run: |
        echo "Scanning for potential secrets..."
        
        # Check for common secret patterns in suspicious contexts (assignments, strings)
        # Exclude test files and legitimate code patterns
        SUSPICIOUS=$(grep -r -E "(api_key|apikey|secret_key|password)\s*[:=]" \
          --include="*.cs" --include="*.json" --include="*.yml" --include="*.yaml" \
          src/ samples/ 2>/dev/null | grep -v "// " | grep -v "GetEnvironmentVariable" || true)
        
        if [ -n "$SUSPICIOUS" ]; then
          echo "⚠️ Potential secrets found. Manual review required:"
          echo "$SUSPICIOUS"
        else
          echo "✅ No obvious hardcoded secrets detected"
        fi
        
        # Check for actual OpenAI API keys (sk-proj-... or sk-... patterns with actual key content)
        # These are 51+ character strings starting with sk-
        if grep -r -E "sk-[a-zA-Z0-9]{48,}" --include="*.cs" --include="*.json" src/ samples/ 2>/dev/null; then
          echo "❌ Potential OpenAI API key found in source code"
          echo "::error::API key patterns detected in source code"
          exit 1
        else
          echo "✅ No API key patterns found in source code"
        fi

    - name: Upload vulnerability report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: |
          vulnerability-report.txt
          devskim-results.sarif
        retention-days: 30